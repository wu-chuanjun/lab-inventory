<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>课题组库存管理系统</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Login -->
<div id="loginPage" class="login-page" style="display:flex;">
  <div class="login-card">
    <div id="loginPanel" style="display:block;">
      <h2>登录</h2>
      <p>课题组库存同步系统</p>
      <form id="loginForm">
        <div class="field-group">
          <label>用户名</label>
          <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username" />
        </div>
        <div class="field-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password" />
        </div>
        <div class="err" id="loginErr"></div>
        <div class="btn-row">
          <button type="submit" class="primary" style="flex:1;">登录</button>
        </div>
      </form>
      <div class="toggle-link">没有账号？<a id="showReg">注册新账号</a></div>
    </div>

    <div id="registerPanel" style="display:none;">
      <h2>注册</h2>
      <p>加入课题组库存共享</p>
      <form id="regForm">
        <div class="field-group">
          <label>用户名 <span class="req">*</span></label>
          <input type="text" id="regUsername" placeholder="字母或数字" autocomplete="username" />
        </div>
        <div class="field-group">
          <label>显示名称 <span style="color:var(--muted);font-size:11px;">（选填，默认同用户名）</span></label>
          <input type="text" id="regDisplayName" placeholder="例如：张三" />
        </div>
        <div class="field-group">
          <label>密码 <span class="req">*</span></label>
          <input type="password" id="regPassword" autocomplete="new-password" />
        </div>
        <div class="field-group">
          <label>课题组注册码 <span class="req">*</span></label>
          <input type="text" id="regCode" placeholder="找管理员获取注册码" />
        </div>
        <div class="err" id="regErr"></div>
        <div class="btn-row">
          <button type="submit" class="primary" style="flex:1;">注册</button>
        </div>
      </form>
      <div class="toggle-link">已有账号？<a id="showLogin">去登录</a></div>
    </div>
  </div>
</div>

<!-- App -->
<div id="appMain" style="display:none;">
<div class="wrap">

  <header class="topbar">
    <div class="brand">
      <div class="logo">库</div>
      <div class="brand-text">
        <h1>智能库存管理系统</h1>
        <p>名称·CAS号·规格·数量·提供商·库存地</p>
        <div class="user-bar" id="userBar" style="display:none;">
          <span class="ws-status"><span id="wsDot" class="ws-dot offline"></span> 实时同步</span>
          <span class="user-name">
            <span class="user-avatar" id="userAvatar">?</span>
            <span id="userName"></span>
            <span class="role-tag" id="userRole"></span>
          </span>
          <a class="user-link" id="btnOps">操作日志</a>
          <a class="user-link" id="btnRefresh">刷新</a>
          <a class="user-link" id="btnLogout">退出</a>
        </div>
      </div>
    </div>
    <div class="actions">
      <button id="btnImport" class="btn-white">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导入CSV
      </button>
      <button id="btnExport" class="btn-white">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出CSV
      </button>
      <button class="primary" id="btnAdd">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增物品
      </button>
      <input type="file" id="fileInput" accept=".csv" style="display:none" />
    </div>
  </header>

  <section class="stats">
    <div class="stat-card">
      <div class="label">物品种类</div>
      <div class="value" id="statKinds">0</div>
      <div class="sub">不同物品条目数</div>
    </div>
    <div class="stat-card">
      <div class="label">库存总量</div>
      <div class="value" id="statQty">0</div>
      <div class="sub">所有物品数量合计</div>
    </div>
    <div class="stat-card">
      <div class="label">库存地</div>
      <div class="value" id="statLocs">0</div>
      <div class="sub">不同存放地点数</div>
    </div>
    <div class="stat-card warn">
      <div class="label">低库存预警</div>
      <div class="value" id="statWarn">0</div>
      <div class="sub">低于阈值 <input type="number" id="warnThreshold" value="10" min="0" style="width:54px;padding:2px 4px;font-size:12px;border:1px solid var(--border);border-radius:6px;" /> 件</div>
    </div>
  </section>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="搜索 名称 / CAS号 / 提供商 / 库存地…" />
    </div>
    <div class="field">
      <label>按库存地筛选</label>
      <select id="filterLoc"><option value="">全部</option></select>
    </div>
    <div class="field">
      <label>按提供商筛选</label>
      <select id="filterProv"><option value="">全部</option></select>
    </div>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-key="name">名称 <span class="arrow">▲▼</span></th>
            <th data-key="cas">CAS号 <span class="arrow">▲▼</span></th>
            <th data-key="spec">规格 <span class="arrow">▲▼</span></th>
            <th data-key="qty">数量 <span class="arrow">▲▼</span></th>
            <th data-key="provider">提供商 <span class="arrow">▲▼</span></th>
            <th data-key="location">库存地 <span class="arrow">▲▼</span></th>
            <th class="no-sort">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="emptyState" style="display:none;">
      <div class="big">📦</div>
      <div>暂无库存数据，点击「＋ 新增物品」开始记录吧</div>
    </div>
  </div>
</div>
</div>

<!-- Modal: Item form -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">新增物品</h2>
    <form id="itemForm" novalidate>
      <input type="hidden" id="itemId" />
      <div class="form-grid">
        <div class="field-group full">
          <label>名称 <span class="req">*</span></label>
          <input type="text" id="f_name" placeholder="例如：无水乙醇" />
          <div class="err">请填写名称</div>
        </div>
        <div class="field-group">
          <label>CAS号</label>
          <input type="text" id="f_cas" placeholder="例如：64-17-5" />
          <div class="err">CAS号格式应为 数字-数字-数字</div>
        </div>
        <div class="field-group">
          <label>规格</label>
          <input type="text" id="f_spec" placeholder="例如：500mL / AR" />
        </div>
        <div class="field-group">
          <label>数量 <span class="req">*</span></label>
          <input type="number" id="f_qty" placeholder="例如：12" min="0" step="any" />
          <div class="err">数量必须为 ≥0 的数字</div>
        </div>
        <div class="field-group">
          <label>提供商</label>
          <input type="text" id="f_provider" placeholder="例如：国药集团" />
        </div>
        <div class="field-group">
          <label>库存地</label>
          <input type="text" id="f_location" placeholder="例如：A区-3柜" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="btnCancel">取消</button>
        <button type="submit" class="primary">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Operation log -->
<div class="overlay" id="opsOverlay">
  <div class="modal wide">
    <h2>操作日志</h2>
    <div class="op-log" id="opLogContent">
      <div style="padding:40px;text-align:center;color:var(--muted)">加载中…</div>
    </div>
    <div class="modal-footer">
      <button id="btnOpsClose">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
